name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Project uses objectVersion 77 (Xcode 16). Xcode 15.x cannot open this format.
      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Run unit tests
        run: |
          xcodebuild test \
            -scheme StockPriceTracker \
            -destination 'generic/platform=iOS Simulator' \
            -only-testing:StockPriceTrackerTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
